<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SCRATCH STUDIO v15.0 - 终极生产版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&family=Fira+Code:wght@400&display=swap');

        :root { --panel: #1e1e2d; --accent: #7267ef; --bg: #0a0a0c; --success: #00c853; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; height: 100vh; overflow: hidden; }

        /* --- 1. 左侧控制面板 --- */
        #aside { width: 350px; background: var(--panel); border-right: 1px solid #323248; display: flex; flex-direction: column; z-index: 100; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .header { padding: 20px; background: #252535; border-bottom: 1px solid #323248; font-weight: bold; color: var(--accent); font-size: 16px; letter-spacing: 1px; }
        .scroll { flex: 1; overflow-y: auto; padding: 15px; }
        
        .group { background: #2b2b3d; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #3f3f5a; }
        .group h4 { margin: 0 0 12px 0; font-size: 11px; color: #888; text-transform: uppercase; border-bottom: 1px solid #3f3f5a; padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        .row { display: flex; align-items: center; margin-bottom: 10px; font-size: 12px; }
        .row label { width: 110px; color: #bbb; }
        .row input, .row select { flex: 1; background: #151520; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; outline: none; }
        .row input[type="range"] { accent-color: var(--accent); cursor: pointer; }

        /* --- 2. 预览区与画布 --- */
        #viewport { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #111; overflow: auto; }
        #artboard { 
            position: relative; width: 360px; height: 720px; 
            background: url('64005.jpg') center/100% 100% no-repeat;
            background-color: #333; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* 元素通用交互样式 */
        .u-el { position: absolute; cursor: move; border: 2px solid transparent; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .u-el:hover { border: 1px dashed var(--accent); }
        .u-el.active { border: 2px solid var(--accent) !important; background: rgba(114, 103, 239, 0.15); }
        
        /* 斜拉缩放手柄 */
        .resizer { position: absolute; width: 14px; height: 14px; background: #fff; border: 2px solid var(--accent); right: -7px; bottom: -7px; cursor: nwse-resize; z-index: 100; border-radius: 50%; }

        /* 内部排版逻辑 */
        .grid-box { display: grid; width: 100%; height: 100%; pointer-events: none; }
        .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .val { font-family: 'Montserrat', sans-serif; font-weight: 900; line-height: 1; }
        .amt { font-family: 'Oswald', sans-serif; font-weight: 700; line-height: 1.2; }

        canvas { width: 100%; height: 100%; display: block; pointer-events: none; }
        
        /* --- 按钮样式 --- */
        .btn { border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; color: white; }
        .btn-blue { background: var(--accent); }
        .btn-green { background: var(--success); box-shadow: 0 4px 12px rgba(0,200,83,0.3); }

        /* --- 弹窗 --- */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        #modal-content { width: 800px; height: 80%; background: #1e1e2e; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid #444; }
        #code-text { flex: 1; background: #0d0d15; color: #a6accd; padding: 25px; font-family: 'Fira Code', monospace; font-size: 13px; overflow: auto; border: none; outline: none; white-space: pre; }
    </style>
</head>
<body>

<aside id="aside">
    <div class="header">PRO SCRATCH EDITOR V15</div>
    <div class="scroll">
        
        <div class="group">
            <h4>🎯 实时属性控制 <span id="cur-id" style="color:var(--accent)">NONE</span></h4>
            <div class="row"><label>文本/涂层颜色</label><input type="color" id="p-color" oninput="applyProp()"></div>
            <div class="row"><label>数字大小 (px)</label><input type="range" id="p-fs" min="10" max="120" oninput="applyProp()"></div>
            <div class="row"><label>金额大小 (px)</label><input type="range" id="p-amt-fs" min="8" max="40" oninput="applyProp()"></div>
        </div>

        <div class="group">
            <h4>🔢 矩阵排版控制</h4>
            <div class="row"><label>列数 × 行数</label>
                <input type="number" id="g-cols" value="5" style="width:45px" onchange="buildGrid()"> × 
                <input type="number" id="g-rows" value="5" style="width:45px" onchange="buildGrid()">
            </div>
            <div class="row"><label>水平间距 (Gap X)</label><input type="range" id="g-gapx" min="0" max="50" oninput="applyProp()"></div>
            <div class="row"><label>垂直间距 (Gap Y)</label><input type="range" id="g-gapy" min="0" max="50" oninput="applyProp()"></div>
        </div>

        <div class="group">
            <h4>🏗️ 刮奖区控制</h4>
            <div class="row"><label>暗纹纹理</label>
                <select id="p-tex" onchange="applyProp()">
                    <option value="usd">💲 美元符号 (USD)</option>
                    <option value="eur">💶 欧元符号 (EUR)</option>
                    <option value="slash">📐 欧美斜纹 (Slash)</option>
                    <option value="dots">防伪点阵</option>
                </select>
            </div>
            <button class="btn btn-blue" style="font-size:11px; padding:6px;" onclick="addLayerManually()">添加新刮奖层</button>
        </div>

        <button class="btn btn-green" onclick="output('code')">📄 生成一键 HTML 代码</button>
        <button class="btn btn-green" style="background:#0288d1;" onclick="output('json')">⚙️ 生成一键参数 JSON</button>
    </div>
</aside>

<main id="viewport">
    <div id="artboard">
        <div id="UI_Winning_Num" class="u-el" style="left:130px; top:120px; width:100px; height:120px; color:#000;">
            <div class="cell"><div class="val" style="font-size:45px;">88</div><div class="amt" style="font-size:14px;color:red;">WINNER</div></div>
            <div class="resizer"></div>
        </div>

        <div id="UI_Number_Grid" class="u-el active" style="left:20px; top:280px; width:320px; height:400px; color:#fff;">
            <div id="grid-inner" class="grid-box"></div>
            <div class="resizer"></div>
        </div>

        </div>
</main>

<div id="modal">
    <div id="modal-content">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <span id="modal-title">OUTPUT</span>
            <div>
                <button class="btn btn-blue" style="width:auto; margin:0; padding:5px 20px;" onclick="copyResult()">一键复制</button>
                <button class="btn" style="width:auto; margin:0; padding:5px 20px; background:#ff4444;" onclick="closeModal()">关闭</button>
            </div>
        </div>
        <textarea id="code-text" readonly></textarea>
    </div>
</div>

<script>
    let activeEl = document.getElementById('UI_Number_Grid');
    let layerCount = 0;

    function init() {
        buildGrid();
        bindEvents(document.getElementById('UI_Winning_Num'));
        bindEvents(document.getElementById('UI_Number_Grid'));
        
        // 初始生成两个不同位置的刮奖区 (功能3)
        addLayerAt(130, 120, 100, 120, "Layer_Winner_Cover");
        addLayerAt(20, 280, 320, 400, "Layer_Grid_Cover");
        
        updateUIControls();
    }

    // --- 核心功能 2: 矩阵生成 ---
    function buildGrid() {
        const c = document.getElementById('g-cols').value;
        const r = document.getElementById('g-rows').value;
        const box = document.getElementById('grid-inner');
        box.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
        
        let html = '';
        for(let i=0; i < c * r; i++) {
            const n = Math.floor(Math.random()*90)+10;
            const a = [5, 10, 20, 50, 100][Math.floor(Math.random()*5)];
            html += `<div class="cell"><span class="val">${n}</span><span class="amt">$${a}</span></div>`;
        }
        box.innerHTML = html;
        applyProp();
    }

    // --- 核心逻辑: 属性同步 ---
    function applyProp() {
        if(!activeEl) return;
        const color = document.getElementById('p-color').value;
        const fs = document.getElementById('p-fs').value;
        const afs = document.getElementById('p-amt-fs').value;

        if(activeEl.id === 'UI_Number_Grid') {
            activeEl.querySelector('.grid-box').style.columnGap = document.getElementById('g-gapx').value + 'px';
            activeEl.querySelector('.grid-box').style.rowGap = document.getElementById('g-gapy').value + 'px';
            activeEl.querySelectorAll('.val').forEach(v => { v.style.fontSize = fs + 'px'; v.style.color = color; });
            activeEl.querySelectorAll('.amt').forEach(a => { a.style.fontSize = afs + 'px'; });
        } else if(activeEl.id === 'UI_Winning_Num') {
            activeEl.querySelector('.val').style.fontSize = fs + 'px';
            activeEl.querySelector('.val').style.color = color;
            activeEl.querySelector('.amt').style.fontSize = afs + 'px';
        } else if(activeEl.classList.contains('cvs-layer')) {
            drawCanvas(activeEl.querySelector('canvas'), color);
        }
    }

    // --- 核心功能 3: 独立刮奖区逻辑 ---
    function addLayerAt(x, y, w, h, id) {
        layerCount++;
        const div = document.createElement('div');
        div.className = 'u-el cvs-layer';
        div.id = id || "Layer_" + layerCount;
        div.style.cssText = `left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:${100+layerCount};`;
        
        const cvs = document.createElement('canvas');
        div.appendChild(cvs);
        const rs = document.createElement('div');
        rs.className = 'resizer';
        div.appendChild(rs);

        document.getElementById('artboard').appendChild(div);
        bindEvents(div);
        drawCanvas(cvs, "#c0c0c0");
    }

    function addLayerManually() { addLayerAt(100, 300, 150, 100); selectEl(document.querySelector('.cvs-layer:last-child')); }

    function drawCanvas(cvs, baseColor) {
        const p = cvs.parentElement;
        cvs.width = p.offsetWidth; cvs.height = p.offsetHeight;
        const ctx = cvs.getContext('2d');
        const type = document.getElementById('p-tex').value;

        ctx.fillStyle = baseColor || "#c0c0c0";
        ctx.fillRect(0,0,cvs.width, cvs.height);
        
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.font = "bold 16px Arial";
        const char = (type === 'usd') ? '$' : (type === 'eur' ? '€' : null);
        
        if(char) {
            for(let i=10; i<cvs.width+20; i+=30) for(let j=25; j<cvs.height+20; j+=30) ctx.fillText(char, i, j);
        } else if(type === 'slash') {
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            for(let i=-cvs.height; i<cvs.width; i+=12) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i+cvs.height, cvs.height); ctx.stroke();
            }
        }
    }

    // --- 鼠标交互系统 ---
    function bindEvents(el) {
        el.onmousedown = (e) => {
            if(e.target.className === 'resizer') return;
            selectEl(el);
            let ox = e.clientX - el.offsetLeft, oy = e.clientY - el.offsetTop;
            document.onmousemove = (me) => { el.style.left = (me.clientX-ox)+'px'; el.style.top = (me.clientY-oy)+'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
        const rs = el.querySelector('.resizer');
        rs.onmousedown = (e) => {
            e.stopPropagation();
            let sw = el.offsetWidth, sh = el.offsetHeight, sx = e.clientX, sy = e.clientY;
            document.onmousemove = (me) => {
                el.style.width = Math.max(30, sw+(me.clientX-sx))+'px'; el.style.height = Math.max(30, sh+(me.clientY-sy))+'px';
                if(el.querySelector('canvas')) drawCanvas(el.querySelector('canvas'), el.style.color);
                applyProp();
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    function selectEl(el) {
        document.querySelectorAll('.u-el').forEach(i=>i.classList.remove('active'));
        activeEl = el; el.classList.add('active');
        document.getElementById('cur-id').innerText = el.id;
        updateUIControls();
    }

    function updateUIControls() {
        if(!activeEl) return;
        // 反推数值到滑块
        const style = window.getComputedStyle(activeEl);
        const valPart = activeEl.querySelector('.val');
        if(valPart) document.getElementById('p-fs').value = parseInt(window.getComputedStyle(valPart).fontSize);
    }

    // --- 功能 4 & 5: 生成系统 ---
    function output(mode) {
        const grid = document.getElementById('UI_Number_Grid');
        const win = document.getElementById('UI_Winning_Num');
        const config = {
            winningArea: { x: win.style.left, y: win.style.top, w: win.offsetWidth, h: win.offsetHeight, fs: win.querySelector('.val').style.fontSize, color: win.style.color },
            gridArea: { x: grid.style.left, y: grid.style.top, w: grid.offsetWidth, h: grid.offsetHeight, cols: document.getElementById('g-cols').value, gap: document.getElementById('g-gapx').value },
            layers: Array.from(document.querySelectorAll('.cvs-layer')).map(l => ({ id: l.id, x: l.style.left, y: l.style.top, w: l.offsetWidth, h: l.offsetHeight }))
        };

        if(mode === 'json') {
            document.getElementById('code-text').value = JSON.stringify(config, null, 4);
            document.getElementById('modal-title').innerText = "CONFIG JSON PARAMETERS";
        } else {
            // 此处生成简化的生产HTML
            let layersCode = config.layers.map(l => `<canvas class="s-layer" style="position:absolute; left:${l.x}; top:${l.y}; width:${l.w}px; height:${l.h}px; z-index:10;"></canvas>`).join('\n        ');
            document.getElementById('code-text').value = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        #card { position:relative; width:360px; height:720px; background:url('64005.jpg'); overflow:hidden; }
        .val { font-family:sans-serif; font-weight:900; }
        canvas { cursor:crosshair; touch-action:none; }
    </style>
</head>
<body>
    <div id="card">
        <div style="position:absolute; left:${win.style.left}; top:${win.style.top};">${win.innerHTML}</div>
        <div style="position:absolute; left:${grid.style.left}; top:${grid.style.top};">${grid.innerHTML}</div>
        ${layersCode}
    </div>
    <script>
        // 此处省略刮除交互JS逻辑... (已在之前的版本中提供)
    <\/script>
</body>
</html>`;
            document.getElementById('modal-title').innerText = "PRODUCTION HTML CODE";
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function copyResult() {
        const t = document.getElementById('code-text');
        t.select(); document.execCommand('copy'); alert("已复制！");
    }

    window.onload = init;
</script>
</body>
</html>
