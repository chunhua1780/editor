<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SCRATCH MASTER - 矩阵与中奖号全控版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&display=swap');

        :root {
            --panel-bg: #1e1e2d;
            --accent: #7267ef;
            --text-main: #e1e1e6;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f12; color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- 编辑面板 --- */
        #aside-tools { width: 340px; background: var(--panel-bg); border-right: 1px solid #323248; display: flex; flex-direction: column; }
        .aside-header { padding: 15px; background: #252535; border-bottom: 1px solid #323248; font-weight: bold; color: var(--accent); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }

        .group { background: #2b2b3d; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #3f3f5a; }
        .group h4 { margin: 0 0 12px 0; font-size: 11px; text-transform: uppercase; color: #888; border-bottom: 1px solid #3f3f5a; padding-bottom: 5px; }
        
        .row { display: flex; align-items: center; margin-bottom: 10px; font-size: 12px; gap: 8px; }
        .row label { width: 90px; }
        .row input[type="range"] { flex: 1; accent-color: var(--accent); }
        .row input[type="number"], .row input[type="color"] { background: #151520; color: #fff; border: 1px solid #444; padding: 2px; }

        /* --- 画布预览区 --- */
        #viewport { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #111; overflow: auto; }
        
        #card-container {
            position: relative; width: 360px; height: 720px;
            background: url('64005.jpg') center/100% 100% no-repeat;
            background-color: #333; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        /* 元素容器 */
        .u-item { position: absolute; cursor: move; border: 1px solid transparent; user-select: none; box-sizing: border-box; }
        .u-item:hover { border: 1px dashed var(--accent); }
        .u-item.active { border: 2px solid var(--accent) !important; background: rgba(114, 103, 239, 0.1); }
        
        /* 斜拉缩放手柄 */
        .resizer { position: absolute; width: 12px; height: 12px; background: #fff; border: 2px solid var(--accent); right: -6px; bottom: -6px; cursor: nwse-resize; z-index: 100; }

        /* 内部内容布局 */
        #win-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        #grid-content { display: grid; width: 100%; height: 100%; }
        .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

        /* 画布层 */
        .layer-cvs { position: absolute; pointer-events: none; z-index: 50; }

        .btn-export { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<aside id="aside-tools">
    <div class="aside-header">SCRATCH EDITOR PRO</div>
    <div class="scroll-area">
        
        <div class="group">
            <h4>🏆 中奖号码 (Winning No.)</h4>
            <div class="row"><label>字体颜色</label><input type="color" id="win-color" value="#000000" oninput="sync()"></div>
            <div class="row"><label>字体大小</label><input type="range" id="win-fs" min="10" max="100" value="40" oninput="sync()"></div>
        </div>

        <div class="group">
            <h4>🔢 刮奖矩阵 (Grid Matrix)</h4>
            <div class="row"><label>行列设定</label>
                <input type="number" id="cols" value="5" style="width:40px" onchange="buildGrid()"> × 
                <input type="number" id="rows" value="5" style="width:40px" onchange="buildGrid()">
            </div>
            <div class="row"><label>水平间距</label><input type="range" id="gap-x" min="0" max="50" value="10" oninput="sync()"></div>
            <div class="row"><label>垂直间距</label><input type="range" id="gap-y" min="0" max="50" value="15" oninput="sync()"></div>
            <div class="row"><label>数字大小</label><input type="range" id="num-fs" min="10" max="50" value="22" oninput="sync()"></div>
            <div class="row"><label>数字颜色</label><input type="color" id="num-color" value="#ffffff" oninput="sync()"></div>
        </div>

        <div class="group">
            <h4>🎨 画布涂层 (Canvas)</h4>
            <button class="btn-export" style="background:#444;" onclick="addLayer()">添加刮奖涂层</button>
            <div class="row" style="margin-top:10px;"><label>涂层颜色</label><input type="color" id="cvs-color" value="#c0c0c0" oninput="drawAll()"></div>
        </div>

        <button class="btn-export" onclick="alert('代码已在控制台生成！')">导出完整生产代码</button>
    </div>
</aside>

<main id="viewport">
    <div id="card-container">
        <div id="win-item" class="u-item" style="left:145px; top:130px; width:70px; height:70px;">
            <div id="win-content">88</div>
            <div class="resizer"></div>
        </div>

        <div id="grid-item" class="u-item active" style="left:20px; top:260px; width:320px; height:420px;">
            <div id="grid-content"></div>
            <div class="resizer"></div>
        </div>
    </div>
</main>

<script>
    let activeItem = null;
    let layers = [];

    function init() {
        buildGrid();
        setupInteractions();
        addLayer();
    }

    // --- 1. 构建矩阵 ---
    function buildGrid() {
        const c = document.getElementById('cols').value;
        const r = document.getElementById('rows').value;
        const container = document.getElementById('grid-content');
        container.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
        
        let html = '';
        for(let i=0; i<c*r; i++) {
            const n = Math.floor(Math.random()*90)+10;
            const a = [5, 10, 50, 100][Math.floor(Math.random()*4)];
            html += `<div class="cell"><span class="n">${n}</span><span class="a" style="font-family:'Oswald'; font-size:11px; color:#ffeb3b;">$${a}</span></div>`;
        }
        container.innerHTML = html;
        sync();
    }

    // --- 2. 实时同步样式 ---
    function sync() {
        // 中奖号同步
        const win = document.getElementById('win-content');
        win.style.color = document.getElementById('win-color').value;
        win.style.fontSize = document.getElementById('win-fs').value + 'px';

        // 矩阵同步
        const g = document.getElementById('grid-content');
        g.style.columnGap = document.getElementById('gap-x').value + 'px';
        g.style.rowGap = document.getElementById('gap-y').value + 'px';
        
        document.querySelectorAll('.cell .n').forEach(el => {
            el.style.fontSize = document.getElementById('num-fs').value + 'px';
            el.style.color = document.getElementById('num-color').value;
            el.style.fontWeight = '900';
        });

        syncLayers();
    }

    // --- 3. 拖拽与斜拉缩放逻辑 ---
    function setupInteractions() {
        document.querySelectorAll('.u-item').forEach(el => {
            el.onmousedown = (e) => {
                if(e.target.classList.contains('resizer')) return;
                setActive(el);
                let ox = e.clientX - el.offsetLeft;
                let oy = e.clientY - el.offsetTop;
                document.onmousemove = (me) => {
                    el.style.left = (me.clientX - ox) + 'px';
                    el.style.top = (me.clientY - oy) + 'px';
                    syncLayers();
                };
                document.onmouseup = () => document.onmousemove = null;
            };

            const rs = el.querySelector('.resizer');
            rs.onmousedown = (e) => {
                e.stopPropagation();
                let sw = el.offsetWidth;
                let sh = el.offsetHeight;
                let sx = e.clientX;
                let sy = e.clientY;
                document.onmousemove = (me) => {
                    el.style.width = (sw + (me.clientX - sx)) + 'px';
                    el.style.height = (sh + (me.clientY - sy)) + 'px';
                    if(el.id === 'grid-item') drawAll();
                    syncLayers();
                };
                document.onmouseup = () => document.onmousemove = null;
            };
        });
    }

    function setActive(el) {
        document.querySelectorAll('.u-item').forEach(i => i.classList.remove('active'));
        activeItem = el;
        el.classList.add('active');
    }

    // --- 4. 画布层管理 ---
    function addLayer() {
        const cvs = document.createElement('canvas');
        cvs.className = 'layer-cvs';
        document.getElementById('card-container').appendChild(cvs);
        layers.push(cvs);
        drawAll();
        syncLayers();
    }

    function drawAll() {
        const color = document.getElementById('cvs-color').value;
        layers.forEach(c => {
            c.width = c.offsetWidth;
            c.height = c.offsetHeight;
            const ctx = c.getContext('2d');
            ctx.fillStyle = color;
            ctx.fillRect(0,0,c.width, c.height);
            // 简单暗纹：颗粒感
            for(let i=0; i<500; i++) {
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fillRect(Math.random()*c.width, Math.random()*c.height, 2, 2);
            }
        });
    }

    function syncLayers() {
        const grid = document.getElementById('grid-item');
        layers.forEach(l => {
            l.style.left = grid.style.left;
            l.style.top = grid.style.top;
            l.style.width = grid.style.width;
            l.style.height = grid.style.height;
        });
    }

    window.onload = init;
</script>
</body>
</html>
