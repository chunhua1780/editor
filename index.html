<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SCRATCH MASTER - 高级可视化编辑器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@400;700&family=Bebas+Neue&family=Noto+Sans+SC:wght@400;900&display=swap');

        :root {
            --accent: #0078d7; /* 类似 Word 的蓝色主题 */
            --panel-bg: #f3f3f3;
            --canvas-bg: #2d2d2d;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background: var(--canvas-bg); }

        /* --- 上方工具栏 (类 Word) --- */
        #toolbar {
            position: absolute; top: 0; left: 0; right: 0; height: 50px;
            background: white; border-bottom: 1px solid #ccc;
            display: flex; align-items: center; padding: 0 20px; z-index: 1000; gap: 15px;
        }
        .tool-sep { width: 1px; height: 24px; background: #ddd; margin: 0 5px; }
        select, input[type="number"] { padding: 4px; border: 1px solid #ccc; border-radius: 3px; outline: none; }
        .btn-toggle { padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; background: white; font-size: 13px; }
        .btn-toggle.active { background: #e0eef9; border-color: var(--accent); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* --- 左侧属性面板 (类 PS) --- */
        #props-panel {
            width: 280px; background: var(--panel-bg); margin-top: 51px; border-right: 1px solid #ccc;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .prop-group { margin-bottom: 25px; }
        .prop-group h4 { margin: 0 0 12px 0; font-size: 12px; color: #666; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .prop-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; }
        .prop-row label { width: 80px; color: #333; }
        .prop-row input[type="range"] { flex: 1; accent-color: var(--accent); }
        .val-indicator { width: 35px; text-align: right; font-size: 11px; color: #888; }

        /* --- 中央编辑区 --- */
        #viewport { flex: 1; margin-top: 51px; position: relative; overflow: auto; display: flex; justify-content: center; align-items: center; }
        
        #artboard {
            position: relative; width: 360px; height: 720px;
            background: url('64005.jpg') center/100% 100% no-repeat;
            background-color: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* 可编辑元素容器 */
        .editable {
            position: absolute; border: 1px solid transparent; cursor: move;
            user-select: none; display: flex; flex-direction: column;
        }
        .editable:hover { border: 1px dashed var(--accent); }
        .editable.selected { border: 1px solid var(--accent); }

        /* 缩放手柄 */
        .resizer {
            position: absolute; width: 8px; height: 8px; background: white;
            border: 1px solid var(--accent); z-index: 10;
        }
        .resizer.br { right: -5px; bottom: -5px; cursor: nwse-resize; } /* 右下角缩放 */

        /* 数字渲染样式 */
        #grid-container {
            display: grid; width: 100%; height: 100%;
        }
        .num-item { display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .num-val { line-height: 1; }
        .num-amt { font-family: 'Oswald'; }

        /* 导出代码窗口 */
        #export-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000;
            display: none; padding: 50px;
        }
        #code-box { width: 100%; height: 85%; background: #1e1e1e; color: #d4d4d4; padding: 20px; font-family: 'Consolas', monospace; white-space: pre; overflow: auto; border: none; }
    </style>
</head>
<body>

<div id="toolbar">
    <select id="font-family" onchange="applyStyle()">
        <option value="Montserrat">Montserrat</option>
        <option value="Bebas Neue">Bebas Neue</option>
        <option value="Oswald">Oswald</option>
        <option value="Noto Sans SC">思源黑体</option>
    </select>
    <input type="number" id="font-size" value="24" style="width: 50px;" onchange="applyStyle()">
    <div class="tool-sep"></div>
    <button class="btn-toggle" id="btn-bold" onclick="toggleWeight('bold')">B</button>
    <button class="btn-toggle" id="btn-italic" onclick="toggleWeight('italic')">I</button>
    <input type="color" id="font-color" value="#ffffff" oninput="applyStyle()">
    <div class="tool-sep"></div>
    <button class="btn-main" style="margin-left: auto;" onclick="showExport()">生成最终网页代码</button>
</div>

<aside id="props-panel">
    <div class="prop-group">
        <h4>布局控制 (Rows & Cols)</h4>
        <div class="prop-row">
            <label>列数 (Cols)</label>
            <input type="range" id="input-cols" min="1" max="10" value="5" oninput="updateGrid()">
            <span class="val-indicator" id="val-cols">5</span>
        </div>
        <div class="prop-row">
            <label>行数 (Rows)</label>
            <input type="range" id="input-rows" min="1" max="10" value="6" oninput="updateGrid()">
            <span class="val-indicator" id="val-rows">6</span>
        </div>
        <div class="prop-row">
            <label>水平间距</label>
            <input type="range" id="input-gap-x" min="0" max="50" value="10" oninput="updateGrid()">
            <span class="val-indicator"></span>
        </div>
        <div class="prop-row">
            <label>垂直间距</label>
            <input type="range" id="input-gap-y" min="0" max="50" value="15" oninput="updateGrid()">
            <span class="val-indicator"></span>
        </div>
    </div>

    <div class="prop-group">
        <h4>元素对齐 (Position)</h4>
        <div class="prop-row">
            <label>X 坐标</label>
            <input type="number" id="pos-x" value="20" oninput="manualPos()">
        </div>
        <div class="prop-row">
            <label>Y 坐标</label>
            <input type="number" id="pos-y" value="260" oninput="manualPos()">
        </div>
    </div>

    <div class="prop-group">
        <h4>中奖金额显示</h4>
        <div class="prop-row">
            <label>金额大小</label>
            <input type="range" id="amt-size" min="8" max="30" value="12" oninput="applyStyle()">
        </div>
        <div class="prop-row">
            <label>金额颜色</label>
            <input type="color" id="amt-color" value="#d32f2f" oninput="applyStyle()">
        </div>
    </div>
</aside>

<main id="viewport">
    <div id="artboard">
        <div id="win-el" class="editable" style="left: 145px; top: 135px; width: 70px; height: 70px;">
            <div class="num-item" style="height:100%; border:1px dashed #ccc;">88</div>
            <div class="resizer br"></div>
        </div>

        <div id="grid-el" class="editable selected" style="left: 20px; top: 260px; width: 320px; height: 400px;">
            <div id="grid-container"></div>
            <div class="resizer br"></div>
        </div>
    </div>
</main>

<div id="export-modal">
    <div style="display:flex; justify-content:space-between; color:white; margin-bottom:10px;">
        <h3>🚀 生产环境就绪代码</h3>
        <button class="btn-main" onclick="document.getElementById('export-modal').style.display='none'">关闭窗口</button>
    </div>
    <textarea id="code-box" readonly></textarea>
</div>

<script>
    let selectedEl = document.getElementById('grid-el');
    const state = {
        bold: false,
        italic: false
    };

    // --- 1. 核心网格生成与行列逻辑 ---
    function updateGrid() {
        const cols = document.getElementById('input-cols').value;
        const rows = document.getElementById('input-rows').value;
        const gapX = document.getElementById('input-gap-x').value;
        const gapY = document.getElementById('input-gap-y').value;

        document.getElementById('val-cols').innerText = cols;
        document.getElementById('val-rows').innerText = rows;

        const container = document.getElementById('grid-container');
        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        container.style.columnGap = gapX + 'px';
        container.style.rowGap = gapY + 'px';

        // 清空并重新生成指定数量的数字
        container.innerHTML = '';
        const total = cols * rows;
        for(let i=0; i<total; i++) {
            const n = Math.floor(Math.random()*90)+10;
            const a = [5,10,20,50,100][Math.floor(Math.random()*5)];
            container.innerHTML += `
                <div class="num-item">
                    <span class="num-val">${n}</span>
                    <span class="num-amt">$${a}$</span>
                </div>`;
        }
        applyStyle();
    }

    // --- 2. 样式实时应用 (Word 功能) ---
    function applyStyle() {
        const family = document.getElementById('font-family').value;
        const size = document.getElementById('font-size').value;
        const color = document.getElementById('font-color').value;
        const amtSize = document.getElementById('amt-size').value;
        const amtColor = document.getElementById('amt-color').value;

        document.querySelectorAll('.num-val').forEach(el => {
            el.style.fontFamily = family;
            el.style.fontSize = size + 'px';
            el.style.color = color;
            el.style.fontWeight = state.bold ? '900' : 'normal';
            el.style.fontStyle = state.italic ? 'italic' : 'normal';
        });

        document.querySelectorAll('.num-amt').forEach(el => {
            el.style.fontSize = amtSize + 'px';
            el.style.color = amtColor;
        });
    }

    function toggleWeight(type) {
        state[type] = !state[type];
        document.getElementById('btn-' + type).classList.toggle('active');
        applyStyle();
    }

    // --- 3. 拖拽与自由缩放系统 (PS 功能) ---
    function initInteraction() {
        document.querySelectorAll('.editable').forEach(el => {
            el.addEventListener('mousedown', function(e) {
                if(e.target.classList.contains('resizer')) return;
                
                selectedEl = el;
                document.querySelectorAll('.editable').forEach(x => x.classList.remove('selected'));
                el.classList.add('selected');

                let startX = e.clientX - el.offsetLeft;
                let startY = e.clientY - el.offsetTop;

                function move(ev) {
                    el.style.left = (ev.clientX - startX) + 'px';
                    el.style.top = (ev.clientY - startY) + 'px';
                    document.getElementById('pos-x').value = parseInt(el.style.left);
                    document.getElementById('pos-y').value = parseInt(el.style.top);
                }
                function stop() { 
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', stop);
                }
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
            });

            // 缩放逻辑
            const resizer = el.querySelector('.resizer');
            resizer.addEventListener('mousedown', function(e) {
                e.stopPropagation();
                let startW = el.offsetWidth;
                let startH = el.offsetHeight;
                let startX = e.clientX;
                let startY = e.clientY;

                function resize(ev) {
                    el.style.width = (startW + (ev.clientX - startX)) + 'px';
                    el.style.height = (startH + (ev.clientY - startY)) + 'px';
                }
                function stop() {
                    window.removeEventListener('mousemove', resize);
                    window.removeEventListener('mouseup', stop);
                }
                window.addEventListener('mousemove', resize);
                window.addEventListener('mouseup', stop);
            });
        });
    }

    function manualPos() {
        if(!selectedEl) return;
        selectedEl.style.left = document.getElementById('pos-x').value + 'px';
        selectedEl.style.top = document.getElementById('pos-y').value + 'px';
    }

    // --- 4. 导出完整工程代码 ---
    function showExport() {
        const grid = document.getElementById('grid-el');
        const win = document.getElementById('win-el');
        
        const htmlOutput = `
<!DOCTYPE html>
<html>
<head>
    <style>
        #scratch-container { position:relative; width:360px; height:720px; background:url('bg.jpg'); }
        #win-area { position:absolute; left:${win.style.left}; top:${win.style.top}; width:${win.style.width}; height:${win.style.height}; display:flex; justify-content:center; align-items:center; font-family:${document.getElementById('font-family').value}; font-size:${document.getElementById('font-size').value}px; color:${document.getElementById('font-color').value}; }
        #main-grid { 
            position:absolute; left:${grid.style.left}; top:${grid.style.top}; 
            width:${grid.style.width}; height:${grid.style.height};
            display:grid; 
            grid-template-columns:repeat(${document.getElementById('input-cols').value}, 1fr);
            column-gap:${document.getElementById('input-gap-x').value}px;
            row-gap:${document.getElementById('input-gap-y').value}px;
        }
        .n { font-family:${document.getElementById('font-family').value}; font-size:${document.getElementById('font-size').value}px; color:${document.getElementById('font-color').value}; font-weight:${state.bold?'900':'normal'}; }
        .a { font-family:'Oswald'; font-size:${document.getElementById('amt-size').value}px; color:${document.getElementById('amt-color').value}; }
    </style>
</head>
<body>
    <div id="scratch-container">
        <div id="win-area">88</div>
        <div id="main-grid">${document.getElementById('grid-container').innerHTML}</div>
    </div>
</body>
</html>`;
        
        document.getElementById('code-box').textContent = htmlOutput.trim();
        document.getElementById('export-modal').style.display = 'block';
    }

    window.onload = () => {
        updateGrid();
        initInteraction();
    };
</script>

</body>
</html>
